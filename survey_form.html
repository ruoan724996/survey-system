<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型培训反馈调查问卷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-container {
            padding: 40px 30px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .emoji {
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #333;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 3px;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option,
        .checkbox-option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .radio-option:hover,
        .checkbox-option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .radio-option input,
        .checkbox-option input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 60px 30px;
        }

        .success-message.show {
            display: block;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .success-message h2 {
            color: #27ae60;
            margin-bottom: 15px;
        }

        .success-message p {
            color: #666;
            font-size: 16px;
        }

        .error-message {
            background: #fee;
            color: #c0392b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }

            .form-container {
                padding: 30px 20px;
            }

            .section-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 大模型培训反馈调查问卷</h1>
            <p>帮助我们改进培训，更好地支持您的工作</p>
        </div>

        <div class="form-container">
            <div id="error-message" class="error-message"></div>

            <form id="survey-form">
                <!-- 基本信息 -->
                <div class="section">
                    <div class="section-title">
                        <span class="emoji">📝</span>
                        基本信息（可选）
                    </div>

                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" name="姓名" placeholder="自愿填写，不填也可以">
                    </div>

                    <div class="form-group">
                        <label>部门</label>
                        <input type="text" name="部门" placeholder="自愿填写，不填也可以">
                    </div>

                    <div class="form-group">
                        <label>培训日期 <span class="required">*</span></label>
                        <input type="date" name="培训日期" required>
                    </div>
                </div>

                <!-- 培训内容评价 -->
                <div class="section">
                    <div class="section-title">
                        <span class="emoji">📊</span>
                        培训内容评价
                    </div>

                    <div class="form-group">
                        <label>培训内容对您工作的帮助程度 <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="帮助程度" value="1" required> 1 - 帮助很小
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="帮助程度" value="2"> 2
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="帮助程度" value="3"> 3 - 一般
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="帮助程度" value="4"> 4
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="帮助程度" value="5"> 5 - 帮助很大
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>内容难度 <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="内容难度" value="太简单" required> 太简单
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="内容难度" value="刚好" required> 刚好
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="内容难度" value="太难" required> 太难
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>最收获的三个知识点</label>
                        <textarea name="收获知识点" placeholder="请列出您最有收获的知识点..."></textarea>
                    </div>
                </div>

                <!-- 大模型应用深度调研 -->
                <div class="section">
                    <div class="section-title">
                        <span class="emoji">🤖</span>
                        大模型应用深度调研
                    </div>

                    <div class="form-group">
                        <label>是否使用大模型做过完整的功能开发 <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="开发经验" value="是，做过多个项目" required> 是，做过多个项目
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="开发经验" value="是，做过 1-2 个项目"> 是，做过 1-2 个项目
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="开发经验" value="尝试过但未完成"> 尝试过但未完成
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="开发经验" value="没有，仅用于辅助查询"> 没有，仅用于辅助查询
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="开发经验" value="没用过大模型"> 没用过大模型
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>主要开发了什么类型的功能（可多选）</label>
                        <div class="checkbox-group">
                            <label class="checkbox-option">
                                <input type="checkbox" name="功能类型" value="数据处理/转换工具"> 数据处理/转换工具
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="功能类型" value="自动化脚本"> 自动化脚本
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="功能类型" value="API 接口服务"> API 接口服务
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="功能类型" value="前端页面/组件"> 前端页面/组件
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="功能类型" value="数据分析报表"> 数据分析报表
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="功能类型" value="文档生成系统"> 文档生成系统
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="功能类型" value="其他"> 其他
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>开发过程中大模型主要帮您做了什么（可多选）</label>
                        <div class="checkbox-group">
                            <label class="checkbox-option">
                                <input type="checkbox" name="主要帮助" value="生成完整代码"> 生成完整代码
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="主要帮助" value="调试/修复 bug"> 调试/修复 bug
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="主要帮助" value="代码优化重构"> 代码优化重构
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="主要帮助" value="写注释/文档"> 写注释/文档
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="主要帮助" value="技术方案设计"> 技术方案设计
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="主要帮助" value="没做过开发"> 没做过开发
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>使用中遇到的主要困难（可多选）</label>
                        <div class="checkbox-group">
                            <label class="checkbox-option">
                                <input type="checkbox" name="困难问题" value="代码质量不稳定"> 代码质量不稳定
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="困难问题" value="复杂逻辑处理不好"> 复杂逻辑处理不好
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="困难问题" value="需要反复调试修改"> 需要反复调试修改
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="困难问题" value="担心安全/合规问题"> 担心安全/合规问题
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="困难问题" value="不知道如何集成到项目"> 不知道如何集成到项目
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="困难问题" value="其他"> 其他
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 后续关注方向 -->
                <div class="section">
                    <div class="section-title">
                        <span class="emoji">📈</span>
                        后续关注方向
                    </div>

                    <div class="form-group">
                        <label>您最希望深入了解的大模型方向（可多选）</label>
                        <div class="checkbox-group">
                            <label class="checkbox-option">
                                <input type="checkbox" name="关注方向" value="提示词工程与高级技巧"> 提示词工程与高级技巧
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="关注方向" value="代码辅助开发实战"> 代码辅助开发实战
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="关注方向" value="数据分析与可视化"> 数据分析与可视化
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="关注方向" value="文档自动化处理"> 文档自动化处理
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="关注方向" value="知识库搭建与应用"> 知识库搭建与应用
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="关注方向" value="工作流自动化"> 工作流自动化
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="关注方向" value="本地部署与私有化"> 本地部署与私有化
                            </label>
                            <label class="checkbox-option">
                                <input type="checkbox" name="关注方向" value="其他"> 其他
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>希望以什么形式学习</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="学习形式" value="集中培训"> 集中培训
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="学习形式" value="系列工作坊"> 系列工作坊
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="学习形式" value="在线课程"> 在线课程
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="学习形式" value="案例分享会"> 案例分享会
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="学习形式" value="自学资料"> 自学资料
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>愿意投入的学习时间</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="学习时间" value="每周 1-2 小时"> 每周 1-2 小时
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="学习时间" value="3-5 小时"> 3-5 小时
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="学习时间" value="5 小时以上"> 5 小时以上
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="学习时间" value="看情况"> 看情况
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 整体满意度 -->
                <div class="section">
                    <div class="section-title">
                        <span class="emoji">⭐</span>
                        整体满意度
                    </div>

                    <div class="form-group">
                        <label>整体满意度 <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="整体满意度" value="1" required> 1 - 非常不满意
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="整体满意度" value="2"> 2
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="整体满意度" value="3"> 3 - 一般
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="整体满意度" value="4"> 4
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="整体满意度" value="5"> 5 - 非常满意
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>是否会推荐同事参加 <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="是否推荐" value="是" required> 是
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="是否推荐" value="否"> 否
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>其他建议或反馈</label>
                        <textarea name="其他建议" placeholder="请留下您的宝贵建议..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-submit">提交问卷</button>
            </form>

            <div id="success-message" class="success-message">
                <div class="success-icon">✅</div>
                <h2>提交成功！</h2>
                <p>感谢您的反馈，我们会认真考虑您的建议！</p>
            </div>
        </div>
    </div>

    <script>
        // 后端 API 配置 - Railway 后端地址
        const API_BASE_URL = 'https://survey-backend-production.up.railway.app/api';

        // 提交数据到后端
        async function submitToBackend(formData) {
            try {
                const response = await fetch(`${API_BASE_URL}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                if (data.success) {
                    return data;
                } else {
                    throw new Error(data.message || '提交失败');
                }
            } catch (error) {
                console.error('提交错误:', error);
                throw new Error('网络错误，请检查网络连接');
            }
        }

        // 处理表单提交
        document.getElementById('survey-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('.btn-submit');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            
            // 禁用提交按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            errorMessage.classList.remove('show');
            
            try {
                // 收集表单数据
                const formData = new FormData(e.target);
                const data = {};
                
                // 处理单选和文本字段
                for (let [key, value] of formData.entries()) {
                    if (!data[key]) {
                        data[key] = value;
                    }
                }
                
                // 处理多选字段
                const checkboxFields = ['功能类型', '主要帮助', '困难问题', '关注方向'];
                checkboxFields.forEach(field => {
                    const values = formData.getAll(field);
                    if (values.length > 0) {
                        data[field] = values;
                    }
                });
                
                // 转换日期为时间戳
                if (data['培训日期']) {
                    data['培训日期'] = new Date(data['培训日期']).getTime();
                }
                
                console.log('提交数据:', data);
                
                // 提交到后端
                await submitToBackend(data);
                
                // 显示成功消息
                e.target.style.display = 'none';
                successMessage.classList.add('show');
                
            } catch (error) {
                console.error('提交失败:', error);
                errorMessage.textContent = '提交失败：' + error.message;
                errorMessage.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = '提交问卷';
            }
        });

        // 设置默认日期为今天
        document.querySelector('input[name="培训日期"]').valueAsDate = new Date();
    </script>
</body>
</html>
